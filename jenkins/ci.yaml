bids:
  - bid: riscv64/qemu-plic
    build_args:
      - ARCH=riscv64
      - BOARD=qemu-plic
      - KDIR=/home/light/DEMO/linux/linux-6.10
    tests:
      mode: qemu
      cases:
        - zone0_start
        - zone1_start

  - bid: aarch64/qemu-gicv3
    build_args:
      - ARCH=aarch64
      - BOARD=qemu-gicv3
      - KDIR=/home/light/DEMO/linux/linux-5.4
    tests:
      mode: qemu
      uboot_cmd: bootm 0x40400000 - 0x40000000
      cases:
        - zone0_start
        - zone1_start

